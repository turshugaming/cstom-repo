  description: 'Oklar zırhı deler ve ekstra hasar verir'
  type: 'BOW'
  max_level: 4
  rarity: 'RARE'
  applicable_items:
    - 'BOW'
    - 'CROSSBOW'
  effects:
    level_1:
      armor_penetration: 25
      damage_bonus: 1.0
    level_2:
      armor_penetration: 40
      damage_bonus: 2.0
    level_3:
      armor_penetration: 60
      damage_bonus: 3.0
    level_4:
      armor_penetration: 80
      damage_bonus: 4.0
